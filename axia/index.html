<title>Axia — AI Business Operating System | V8 Global</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c9a84c;--bg:#0a0d14;--bg2:#111520;--text:#f0ede6;--text-mid:#a8a49c;--text-dim:#6e6b64;--border:rgba(240,237,230,0.08);}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;-webkit-font-smoothing:antialiased;}
.hero-strip{position:fixed;top:0;left:0;right:0;height:180px;background-image:url('/assets/img/hero-banner.jpg');background-size:cover;background-position:center 30%;z-index:0;}
.hero-strip::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,9,15,0.6),rgba(8,9,15,0.98));}
.coming-soon{position:relative;z-index:1;text-align:center;max-width:560px;margin-top:120px;}
.eyebrow{font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;}
h1{font-family:'Playfair Display',serif;font-size:42px;font-weight:600;color:var(--text);margin-bottom:16px;line-height:1.2;}
p{font-size:15px;color:var(--text-mid);line-height:1.8;font-weight:300;margin-bottom:32px;}
.back-link{font-size:13px;color:var(--text-dim);text-decoration:none;border:0.5px solid rgba(240,237,230,0.12);padding:10px 20px;border-radius:4px;transition:border-color 0.2s;}
.back-link:hover{border-color:rgba(201,168,76,0.3);color:var(--gold);}
</style>
</head>
<body>
<div class="hero-strip"></div>
<div class="coming-soon">
  <div class="eyebrow">V8 Global — Technology</div>
  <h1>Axia</h1>
  <p>The AI business operating system for SME owners. Monitors your inbox, manages your pipeline, drafts outreach, and keeps your CRM current — without a team behind it.<br><br>Full details coming shortly.</p>

</div>
</body>
</html>
